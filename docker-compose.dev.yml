name: capitalos-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capitalos}
      POSTGRES_USER: ${POSTGRES_USER:-capitalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"   # host 5433 → container 5432 (5432 often taken locally)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-capitalos} -d ${POSTGRES_DB:-capitalos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot reload + persist generated migrations
      - uploads:/app/var/uploads
      - ./secrets:/app/secrets:ro   # Enable Banking private key (optional)
    ports:
      - "127.0.0.1:8001:8000"   # host 8001 → container 8000 (8000 often taken locally)
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - internal

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_BASE: /api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    networks:
      - internal

volumes:
  pgdata:
  uploads:
  frontend_node_modules:

networks:
  internal:
    driver: bridge
